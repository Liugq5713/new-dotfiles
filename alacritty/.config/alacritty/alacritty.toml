# TokyoNight Alacritty Colors
# Default colors
[colors.primary]
background = '#23283a'
foreground = '#c0caf5'

# [colors.cursor]
# cursor = '#c0caf5'
# text = '#24283b'

# Normal colors
[colors.normal]
black = '#1d202f'
red = '#f7768e'
green = '#9ece6a'
yellow = '#e0af68'
blue = '#7aa2f7'
magenta = '#bb9af7'
cyan = '#7dcfff'
white = '#a9b1d6'

# Bright colors
[colors.bright]
black = '#414868'
red = '#f7768e'
green = '#9ece6a'
yellow = '#e0af68'
blue = '#7aa2f7'
magenta = '#bb9af7'
cyan = '#7dcfff'
white = '#c0caf5'

# Indexed Colors
[[colors.indexed_colors]]
index = 16
color = '#ff9e64'

[[colors.indexed_colors]]
index = 17
color = '#db4b4b'

[colors.cursor]
cursor = "CellForeground"
text = "CellBackground"

[colors.selection]
background = "CellForeground"
text = "CellBackground"
 
[colors.vi_mode_cursor]
cursor = "CellForeground"
text = "CellBackground"
 
[env]
TERM = "xterm-256color"
 
[font]
size = 16
 
[font.bold]
family = "FiraCode Nerd Font"
style = "Bold"
 
[font.bold_italic]
family = "FiraCode Nerd Font"
style = "Bold Italic"
 
[font.italic]
family = "FiraCode Nerd Font"
style = "Italic"
 
[font.normal]
family = "FiraCode Nerd Font"
style = "Regular"
 
[[keyboard.bindings]]
action = "ReceiveChar"
key = "Back"
 
[[keyboard.bindings]]
action = "Paste"
key = "Paste"
 
[[keyboard.bindings]]
action = "Copy"
key = "Copy"

[[keyboard.bindings]]
key = "t"
mods="Command"
action = "None"

[selection]
save_to_clipboard = true
semantic_escape_chars = ",│`|:\"' ()[]{}<>    "
