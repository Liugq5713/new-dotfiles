# #1 自定义背景色覆盖（import 之后的同 key 会覆盖主题值）
# 原始 storm 主题为 #24283b，这里微调为稍深的蓝灰
[colors.primary]
background = '#23283a'

# #6 显式声明，方便调试时临时关闭
# #1 主题：import 引用而非内联，方便一键切换主题（0.17+ 要求放在 general 下）
[general]
live_config_reload = true
import = [
  "~/.config/alacritty/themes/themes/tokyo_night_storm.toml"
]

# #2 TERM 保留 xterm-256color，需配合 tmux 的 terminal-overrides 启用 true color
[env]
TERM = "xterm-256color"

# #3 窗口配置
[window]
padding = { x = 2, y = 0 }
dynamic_padding = true
# macOS 上让 Option 键作为 Alt，否则 nvim 中 <M-j> 等绑定无法工作
option_as_alt = "Both"

# #4 滚动缓冲区：默认 10000 行，长时间构建日志容易溢出
[scrolling]
history = 50000
multiplier = 3

[font]
size = 16

[font.normal]
family = "FiraCode Nerd Font"
style = "Regular"

[font.bold]
family = "FiraCode Nerd Font"
style = "Bold"

[font.italic]
family = "FiraCode Nerd Font"
style = "Italic"

[font.bold_italic]
family = "FiraCode Nerd Font"
style = "Bold Italic"

# #9 光标配置：配合 zsh vi 模式，insert 用 Beam，normal 用 Block
[cursor]
style = { shape = "Beam", blinking = "On" }
vi_mode_style = { shape = "Block", blinking = "Off" }
blink_interval = 500
blink_timeout = 0

# #5 键盘绑定：只保留有实际意义的，删除了 Back/Paste/Copy 三个默认行为
[[keyboard.bindings]]
key = "t"
mods = "Command"
action = "None"

# #10 清理了末尾多余的空格和制表符
[selection]
save_to_clipboard = true
semantic_escape_chars = ",│`|:\"' ()[]{}<>\t"

# URL 链接识别与点击：Command+点击 打开链接（tmux mouse on 下也能用）
[[hints.enabled]]
command = "open"
hyperlinks = true
post_processing = true
regex = "(ipfs:|ipns:|magnet:|mailto:|gemini://|gopher://|https://|http://|news:|file:|git://|ssh:|ftp://)[^\u0000-\u001F\u007F-\u009F<>\"\\s{-}\\^⟨⟩`]+"

[hints.enabled.binding]
key = "U"
mods = "Command|Shift"

[hints.enabled.mouse]
enabled = true
mods = "Command"
