# =============================================================================
# tmux.conf — clean rewrite, no framework dependency
# =============================================================================

# -- general -----------------------------------------------------------------

set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"  # true color for alacritty
set -s escape-time 0              # no delay after pressing Escape (critical for nvim)
set -sg repeat-time 600           # allow 600ms for repeatable bindings
set -s focus-events on            # let nvim detect FocusLost/FocusGained
set -g history-limit 50000        # generous scrollback
set -g mouse on                   # mouse support (scroll, select pane, resize)

# prefix key: C-a (GNU Screen habit)
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# -- display -----------------------------------------------------------------

set -g base-index 1               # windows start at 1
setw -g pane-base-index 1         # panes start at 1
set -g renumber-windows on        # no gaps after closing a window
set -g set-titles on              # set terminal title
set -g display-panes-time 800
set -g display-time 1000
set -g status-interval 10

# activity
set -g monitor-activity on
set -g visual-activity off

# window naming: let zsh chpwd hook set names, don't auto-rename
setw -g automatic-rename off

# -- navigation & panes -----------------------------------------------------

# create session
bind C-c new-session

# session tree
bind s choose-tree -Zs -O name

# split panes — retain current path
bind - split-window -v -c "#{pane_current_path}"
bind _ split-window -h -c "#{pane_current_path}"

# new window — retain current path
bind c new-window -c "#{pane_current_path}"

# pane navigation (vim-style)
bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R

# pane resizing
bind -r H resize-pane -L 2
bind -r J resize-pane -D 2
bind -r K resize-pane -U 2
bind -r L resize-pane -R 2

# window navigation
unbind n
unbind p
bind -r C-h previous-window
bind -r C-l next-window
bind Tab last-window

# swap windows: prefix + < / >
bind -r < swap-window -d -t -1
bind -r > swap-window -d -t +1

# -- copy mode (vi) ----------------------------------------------------------

setw -g mode-keys vi
bind Enter copy-mode

bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi C-v send -X rectangle-toggle
bind -T copy-mode-vi y send -X copy-selection-and-cancel
bind -T copy-mode-vi Escape send -X cancel
bind -T copy-mode-vi H send -X start-of-line
bind -T copy-mode-vi L send -X end-of-line

# buffers
bind b list-buffers
bind p paste-buffer -p
bind P choose-buffer

# -- reload ------------------------------------------------------------------

bind r source-file ~/.config/tmux/tmux.conf \; display "tmux.conf reloaded"

# -- plugins (tpm) -----------------------------------------------------------

set -g @plugin 'tmux-plugins/tpm'

# clipboard integration
set -g @plugin 'tmux-plugins/tmux-yank'

# open URLs & files from copy mode
set -g @plugin 'tmux-plugins/tmux-open'

# session persistence
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @resurrect-strategy-nvim 'session'
set -g @resurrect-capture-pane-contents 'on'

# auto save/restore sessions
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-restore 'on'

# -- theme: tokyo night ------------------------------------------------------

set -g @plugin 'fabioluciano/tmux-tokyo-night'
set -g @theme_variation 'night'
set -g @theme_left_separator ''
set -g @theme_right_separator ''
set -g @powerkit_plugins "git,datetime"
set -g @powerkit_status_position "bottom"

# -- tpm bootstrap -----------------------------------------------------------
# auto-install tpm if missing
if "test ! -d ~/.config/tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.config/tmux/plugins/tpm && ~/.config/tmux/plugins/tpm/bin/install_plugins'"

run '~/.config/tmux/plugins/tpm/tpm'
