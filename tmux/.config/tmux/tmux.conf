# =============================================================================
# tmux.conf — clean rewrite, no framework dependency
# =============================================================================

# -- general -----------------------------------------------------------------

set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"  # true color for alacritty
set -ga terminal-features ",xterm-256color:hyperlinks"  # clickable hyperlinks (OSC 8)
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'  # undercurl support
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'  # undercurl colors
set -s escape-time 0              # no delay after pressing Escape (critical for nvim)
set -sg repeat-time 600           # allow 600ms for repeatable bindings
set -s focus-events on            # let nvim detect FocusLost/FocusGained
set -s set-clipboard on           # OSC 52 clipboard (works over SSH)
set -g allow-passthrough all       # allow all panes to bypass tmux (OSC 52, images, etc.)
set -g history-limit 50000        # generous scrollback
set -g mouse on                   # mouse support (scroll, select pane, resize)
set -g status-keys emacs          # command prompt uses emacs bindings (even for vim users)
set -wg aggressive-resize on      # better for grouped sessions on multiple monitors

# prefix key: C-a (GNU Screen habit)
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# -- display -----------------------------------------------------------------

set -g base-index 1               # windows start at 1
setw -g pane-base-index 1         # panes start at 1
set -g renumber-windows on        # no gaps after closing a window
set -g set-titles on              # set terminal title
set -g display-panes-time 2000     # enough time to read pane numbers
set -g display-time 4000          # show messages for 4s (default 1s is too fast)
set -g status-interval 10

# activity
set -g monitor-activity on
set -g visual-activity off

# window naming: auto-rename with nerd font icons
setw -g automatic-rename on

# -- navigation & panes -----------------------------------------------------

# create session
bind C-c new-session

# session tree
bind s choose-tree -Zs -O name

# split panes — retain current path
bind - split-window -v -c "#{pane_current_path}"
bind _ split-window -h -c "#{pane_current_path}"

# new window — retain current path
bind c new-window -c "#{pane_current_path}"

# pane navigation: handled by vim-tmux-navigator plugin (C-h/j/k/l without prefix)

# pane resizing (step=5 for faster adjustment)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# window navigation
unbind n
unbind p
bind -r C-h previous-window
bind -r C-l next-window
bind Tab last-window
bind Space switch-client -l       # prefix+Space: switch to last session

# swap windows: prefix + < / >
bind -r < swap-window -d -t -1
bind -r > swap-window -d -t +1

# -- copy mode (vi) ----------------------------------------------------------

setw -g mode-keys vi
bind Enter copy-mode

bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi C-v send -X rectangle-toggle
bind -T copy-mode-vi y send -X copy-selection-and-cancel
bind -T copy-mode-vi Escape send -X cancel
# mouse drag: auto-copy selection to system clipboard and exit copy mode
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi H send -X start-of-line
bind -T copy-mode-vi L send -X end-of-line

# buffers
bind b list-buffers
bind p paste-buffer -p
bind P choose-buffer

# -- floating terminal -------------------------------------------------------

# prefix+g: toggle a floating popup terminal (80% width/height, current path)
bind g if-shell "[ \"$(tmux display-message -p '#{session_name}')\" = z-popup ]" \
  "detach-client" \
  "display-popup -d '#{pane_current_path}' -x L -y S -w 45% -h 40% -E 'tmux new-session -A -s z-popup'"

# -- reload ------------------------------------------------------------------

bind r source-file ~/.config/tmux/tmux.conf \; display "tmux.conf reloaded"

# -- plugins (tpm) -----------------------------------------------------------

set -g @plugin 'tmux-plugins/tpm'

# seamless vim↔tmux pane navigation with C-h/j/k/l
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @vim_navigator_prefix_mapping_clear_screen ''  # don't override prefix+C-l (used for next-window)

# clipboard integration
set -g @plugin 'tmux-plugins/tmux-yank'

# open URLs & files from copy mode
set -g @plugin 'tmux-plugins/tmux-open'

# fzf URL picker: prefix+u to extract & open URLs (handles wrapped long URLs)
set -g @plugin 'wfxr/tmux-fzf-url'

# fuzzy extract text from screen (paths, hashes, words) — prefix+Tab
set -g @plugin 'laktak/extrakto'

# auto nerd font icon in window name (e.g.  for nvim,  for zsh)
set -g @plugin 'joshmedeski/tmux-nerd-font-window-name'

# session fuzzy search (prefix+o to open, requires fzf)
set -g @plugin 'omerxx/tmux-sessionx'

# session persistence
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @resurrect-strategy-nvim 'session'
set -g @resurrect-capture-pane-contents 'on'

# auto save/restore sessions
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-restore 'on'

# -- theme: tokyo night (powerkit) -------------------------------------------

set -g @plugin 'fabioluciano/tmux-powerkit'
set -g @powerkit_theme "tokyo-night"
set -g @powerkit_theme_variant "night"
set -g @powerkit_separator_style "rounded"
set -g @powerkit_plugins "git,datetime"
set -g @powerkit_status_position "bottom"
set -g @powerkit_lazy_loading "true"

# -- tpm bootstrap -----------------------------------------------------------
# auto-install tpm if missing
if "test ! -d ~/.config/tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.config/tmux/plugins/tpm && ~/.config/tmux/plugins/tpm/bin/install_plugins'"

run '~/.config/tmux/plugins/tpm/tpm'

# re-apply bindings that plugins may override
bind -r C-h previous-window
bind -r C-l next-window
